<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Coming Soon</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.58);
      --line: rgba(255, 255, 255, 0.13);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
      overflow: hidden;
    }

    .page {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 100svh;
      padding: 32px;
      isolation: isolate;
    }

    .glow {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(116, 93, 255, 0.18), transparent 66%);
      filter: blur(18px);
      animation: drift 8s ease-in-out infinite alternate;
      z-index: -2;
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      z-index: -1;
      background-image: repeating-radial-gradient(circle at 0 0, transparent 0, #fff 1px, transparent 2px);
      background-size: 14px 14px;
      pointer-events: none;
    }

    .content {
      width: min(900px, 100%);
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #9d8cff;
      box-shadow: 0 0 18px rgba(157, 140, 255, 0.8);
      animation: pulse 1.8s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 14vw, 10rem);
      line-height: 0.88;
      letter-spacing: -0.075em;
      font-weight: 700;
    }

    .ellipsis span {
      display: inline-block;
      animation: blink 1.5s infinite;
    }

    .ellipsis span:nth-child(2) { animation-delay: 0.2s; }
    .ellipsis span:nth-child(3) { animation-delay: 0.4s; }

    .line {
      width: min(240px, 45vw);
      height: 1px;
      margin: 38px auto 0;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    @keyframes blink {
      0%, 20% { opacity: 0.2; transform: translateY(0); }
      45% { opacity: 1; transform: translateY(-2px); }
      70%, 100% { opacity: 0.2; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.55; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @keyframes drift {
      from { transform: translate(-12%, -8%) scale(0.92); }
      to { transform: translate(12%, 8%) scale(1.08); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="glow" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <section class="content" aria-label="Coming soon">
      <div class="eyebrow"><span class="dot"></span> Something new is on the way</div>
      <h1>
        Coming soon<span class="ellipsis" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>
      </h1>
      <div class="line"></div>
    </section>
  </main>
</body>
</html>
